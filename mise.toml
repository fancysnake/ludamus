[settings]
# Sequential execution to avoid race conditions in parallel tests
jobs = 1

[tools]
python = "3.14"
node = "v25.6.1"
poetry = { version = "2.3.2", pyproject = "{{ config_root }}/pyproject.toml" }

[env]
# Mise creates and activates this virtualenv automatically
_.python.venv = { path = ".venv", create = true }
_.file = ".env"

[task_config]
includes = ["tasks.toml"]

[tasks.black]
run = "black src tests"

[tasks.black-check]
run = "black --check src tests"

[tasks.codespell]
run = "codespell src tests/unit tests/integration"

[tasks.deptry]
run = "deptry src tests"

[tasks.djlint]
run = "djlint src --profile=django"

[tasks.djlint-format]
run = "djlint src --reformat --format-css --format-js --profile=django"

[tasks.il]
run = "lint-imports --config=pyproject.toml"

[tasks.mypy]
env = { _.file = '.env.test' }
run = "mypy src"

[tasks.pylint]
run = "pylint src tests"

[tasks.ruff]
run = "ruff check src tests"

[tasks.ruff-fix]
run = "ruff check --fix src tests"

# Base test task with test environment
# Child tasks call this via "mise run" to inherit env vars
[tasks._pytest]
description = "Base pytest runner with test env (internal)"
run = "pytest"
env = { _.file = '.env.test' }

[tasks.unittest]
description = "Run unit tests"
run = "mise run _pytest -- tests/unit --cov=tests.unit --cov=ludamus --fail-on-template-vars"

[tasks.test]
description = "Run all tests"
run = "mise run _pytest -- tests tests/integration tests/unit --fail-on-template-vars"

[tasks.build-frontend]
description = "Build frontend assets (CSS + JS)"
run = """
django-admin tailwind install
django-admin tailwind build
"""

[tasks.ts-check]
run = "cd src/ludamus/gates/web/django/theme/static_src && npm typecheck"

[tasks.kill]
description = "Kill dev servers (Django on :8000, Tailwind watch)"
run = "lsof -ti :8000 | xargs kill -9 2>/dev/null; pkill -f 'tailwindcss.*watch' 2>/dev/null; echo 'Dev servers killed'"

# Composite tasks

[tasks."install:playwright"]
run = """
npm install
npx playwright install --with-deps
"""
description = "Install Playwright"
env = { _.file = '.env.e2e' }
dir = "tests/e2e"

[tasks.e2e]
description = "Run end-to-end Playwright tests (chromium)"
run = "npx playwright test --project=chromium"
env = { _.file = '.env.e2e' }
dir = "tests/e2e"

[tasks.check]
depends = [
    "black",
    "ruff-fix",
    "codespell",
    "mypy",
    "il",
    "djlint",
    "djlint-format",
    "pylint",
]

[tasks.prcheck]
depends = ["black-check", "ruff", "codespell", "mypy", "djlint", "pylint"]

[tasks.update]
run = """
pre-commit autoupdate
pip install -U pip
pip install -U poetry
poetry update
deptry .
pip-audit .
poetry show -o
"""

[tasks.dc]
usage = '''
arg "<environment>" help="Target environment" {
  choices "local" "prod"
}
arg "[dc_args]" var=#true double_dash="optional"
'''
run = '''
GIT_COMMIT_SHA=${GIT_COMMIT_SHA:-$(git rev-parse --short HEAD)}
docker-compose -f docker/compose/{{ usage.environment }}.yaml {{arg(name="dc_args")}}
'''

[tasks."boot-e2e"]
depends = [
    "dj migrate --noinput",
    "dj createcachetable",
    "dj downloadvendor",
    "p run python tests/e2e/scripts/bootstrap_data.py",
    "dj tailwind install",
    "dj tailwind build",
    "dj tailwind dev",
]
env = { _.file = '.env.e2e' }
