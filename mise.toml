[settings]
# Sequential execution to avoid race conditions in parallel tests
jobs = 1

[tools]
python = "3.14"
node = "v25.6.1"
poetry = { version = "2.3.2", pyproject = "{{ config_root }}/pyproject.toml" }
"ast-grep" = "0.42.1"

[env]
# Mise creates and activates this virtualenv automatically
_.python.venv = { path = ".venv", create = true }
_.file = ".env"

[task_config]
includes = ["tasks.toml"]

[tasks.update]
run = """
pre-commit autoupdate
pip install -U pip
pip install -U poetry
poetry update
deptry .
pip-audit .
poetry show -o
"""

# LINT

[tasks._lint]
description = "Base env vars for lint tasks"
run = ""
env.DB_NAME = ":memory:"
env.ENV = "local"
env.PYTHONPATH = "src"
env.SECRET_KEY = "dev-secret-key"

[tasks.black]
run = "mise run _lint -- black src tests"

[tasks.black-check]
run = "mise run _lint -- black --check src tests"

[tasks.codespell]
run = "mise run _lint -- codespell src tests/unit tests/integration"

[tasks.deptry]
run = "mise run _lint -- deptry src tests"

[tasks.djlint]
run = "mise run _lint -- djlint src --profile=django"

[tasks.djlint-format]
run = "mise run _lint -- djlint src --reformat --format-css --format-js --profile=django"

[tasks.il]
run = "mise run _lint -- lint-imports --config=pyproject.toml"

[tasks.mypy]
run = "mise run _lint -- mypy src"

[tasks.pylint]
run = "mise run _lint -- pylint src && mise run _lint -- pylint --disable=duplicate-code tests"

[tasks.ruff]
run = "mise run _lint -- ruff check src tests"

[tasks.ruff-fix]
run = "mise run _lint -- ruff check --fix src tests"

[tasks.ast-grep]
run = "ast-grep scan --error src"

[tasks.vulture]
run = "vulture --config=pyproject.toml src"

[tasks.impeccable]
run = "python scripts/impeccable_lint.py"

[tasks.check]
depends = [
  "black",
  "ruff-fix",
  "codespell",
  "mypy",
  "il",
  "djlint",
  "djlint-format",
  "pylint",
  "vulture",
  "ast-grep",
  "impeccable",
]

[tasks.prcheck]
depends = [
  "black-check",
  "ruff",
  "codespell",
  "mypy",
  "djlint",
  "pylint",
  "vulture",
  "ast-grep",
]

# DJANGO

[tasks.dj]
run = "django-admin"

[tasks.start]
description = "Start Django dev server with frontend watch"
run = "django-admin tailwind dev"

[tasks.build-frontend]
description = "Build frontend assets (CSS + JS)"
run = """
django-admin tailwind install
django-admin tailwind build
"""

# PYTEST

[tasks._pytest]
description = "Base pytest runner with test env (internal)"
run = "pytest"
env.ALLOWED_HOSTS = ".testserver"
env.AUTH0_CLIENT_ID = "test-auth0-client-id"
env.AUTH0_CLIENT_SECRET = "test-auth0-client-secret"
env.AUTH0_DOMAIN = "auth0.example.com"
env.DB_NAME = ":memory:"
env.ENV = "local"
env.MEMBERSHIP_API_BASE_URL = "https://membership-test.example.com/api/v1/endpoint"
env.MEMBERSHIP_API_TOKEN = "membership-test-token"
env.PYTHONPATH = "src"
env.ROOT_DOMAIN = "testserver"
env.SECRET_KEY = "dev-secret-key"
env.SESSION_COOKIE_DOMAIN = ".testserver"

[tasks.unittest]
description = "Run unit tests"
run = "mise run _pytest -- tests/unit --cov=tests.unit --cov=ludamus"

[tasks.test]
description = "Run all tests"
run = "mise run _pytest -- tests tests/integration tests/unit"
env.COVERAGE_FILE = "{{ config_root }}/.coverage.unit"

[tasks."test:mutation"]
description = "Run mutation tests"
run = "mise run _pytest -- --gremlins tests"
env.COVERAGE_FILE = "{{ config_root }}/.coverage.unit"

[tasks.diff-cover]
depends = ["coverage"]
run = """
coverage xml --data-file=.coverage
diff-cover coverage.xml --compare-branch=main
"""

[tasks."coverage:combine"]
description = "Combine integration + e2e coverage and export XML"
run = """
coverage combine .coverage.unit .coverage.e2e
coverage xml -o coverage.xml
coverage report --fail-under=97
"""
env.PYTHONPATH = "src"

# E2E

[tasks._e2e]
run = ''
env.ALLOWED_HOSTS = ".localhost"
env.AUTH0_CLIENT_ID = "test-auth0-client-id"
env.AUTH0_CLIENT_SECRET = "test-auth0-client-secret"
env.AUTH0_DOMAIN = "auth0.example.com"
env.COVERAGE_FILE = "{{ config_root }}/.coverage.e2e"
env.DB_NAME = "dev.e2e.sqlite3"
env.DJANGO_SETTINGS_MODULE = "ludamus.edges.settings"
env.ENV = "local"
env.MEMBERSHIP_API_BASE_URL = "https://membership-test.example.com/api/v1/endpoint"
env.MEMBERSHIP_API_TOKEN = "membership-test-token"
env.PYTHONPATH = "src"
env.ROOT_DOMAIN = "localhost:8000"
env.SECRET_KEY = "e2e-secret-key"
env.SESSION_COOKIE_DOMAIN = ".localhost"

[tasks."install:playwright"]
run = """
npm install
npx playwright install --with-deps
"""
description = "Install Playwright"
dir = "tests/e2e"

[tasks.e2e]
description = "Run end-to-end Playwright tests (chromium)"
run = """
npx playwright test --project=chromium --project=chromium-auth
mise run _e2e -- coverage report
"""
dir = "tests/e2e"

[tasks."boot-e2e"]
description = "Bootstrap and start dev server for e2e tests"
run = """
mise run _e2e -- django-admin migrate --noinput
mise run _e2e -- django-admin createcachetable
mise run _e2e -- django-admin downloadvendor
mise run _e2e -- python tests/e2e/scripts/bootstrap_data.py
mise run _e2e -- django-admin tailwind install
mise run _e2e -- django-admin tailwind build
exec mise run _e2e -- coverage run --source=src -m django runserver --insecure --noreload
"""

# DEPLOYMENT

[tasks.dc]
usage = '''
arg "<environment>" help="Target environment" {
  choices "local" "prod"
}
arg "[dc_args]" var=#true double_dash="optional"
'''
run = '''
GIT_COMMIT_SHA=${GIT_COMMIT_SHA:-$(git rev-parse --short HEAD)}
docker compose -f docker/compose/{{ usage.environment }}.yaml {{arg(name="dc_args")}}
'''

[tasks.kill]
description = "Kill dev servers (Django on :8000, Tailwind watch)"
run = "lsof -ti :8000 | xargs kill -9 2>/dev/null; pkill -f 'tailwindcss.*watch' 2>/dev/null; echo 'Dev servers killed'"

# FRONTEND

[tasks.ts-check]
run = "cd src/ludamus/gates/web/django/theme/static_src && npm typecheck"


[tasks.npm]
run = "npm"
dir = "src/ludamus/gates/web/django/theme/static_src"

# OTHER

[tasks.shitcheck]
run = "git diff main|grep -E '^\\+.*(noqa|type: ignore|Any|ANY|pylint|pragma|cast\\()'"

[tasks.coverage]
depends = ["test --cov", "e2e", "coverage:combine"]
