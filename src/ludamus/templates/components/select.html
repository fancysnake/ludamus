{# Select element. Two modes: #}
{# Tag mode ({% select %}): attrs (safe string), extra_class, slot (safe string) #}
{# Form mode (render_select): name, id, choices, selected, required, has_errors #}
<select class="w-full px-3 py-2 text-sm rounded-lg border {% if has_errors|default:False %}border-danger{% else %}border-border{% endif %} bg-bg-secondary text-foreground disabled:opacity-50 disabled:cursor-not-allowed{% if extra_class|default:"" %} {{ extra_class }}{% endif %}"
        {% if attrs|default:"" %}{{ attrs }}{% else %}{% if id|default:"" %}id="{{ id }}"{% endif %}
        name="{{ name|default:"" }}"
        {% if required|default:False %}required{% endif %}
        {% endif %}>
    {% if choices|default:"" %}
        {% for value, label in choices %}
            <option value="{{ value }}"
                    {% if value|stringformat:"s" == selected|default:""|stringformat:"s" %}selected{% endif %}>
                {{ label }}
            </option>
        {% endfor %}
    {% else %}
        {{ slot|default:"" }}
    {% endif %}
</select>
