{% load tessera %}
{# Field value pill. #}
{# Variables: value (text), icon (heroicon name, optional), size ("sm"|"md", default "md") #}
<span class="inline-flex items-center gap-1 rounded-2xl font-medium max-w-[200px] bg-warm-200/80 dark:bg-neutral-700 text-warm-700 dark:text-neutral-300{% if size == 'sm' %} text-xs px-2 py-0.5{% else %} text-sm px-2.5 py-0.5{% endif %}"
      title="{{ title|default:value }}">
    {% if icon %}
        {% icon icon class="size-3.5 shrink-0 opacity-80" variant="mini" %}
    {% endif %}
    <span class="truncate">{{ value }}</span>
</span>
