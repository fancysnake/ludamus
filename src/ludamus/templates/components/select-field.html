{# Select field for Django form rendering. #}
{# Variables: name, id, choices (list of (value, label)), selected, required, has_errors #}
<select class="w-full px-3 py-2 text-sm rounded-lg border border-border bg-bg-secondary text-foreground disabled:opacity-50 disabled:cursor-not-allowed"
        {% if id|default:"" %}id="{{ id }}"{% endif %}
        name="{{ name }}"
        {% if required|default:False %}required{% endif %}
        {% if has_errors|default:False %}style="border-color: var(--theme-danger);"{% endif %}>
    {% for value, label in choices %}
        <option value="{{ value }}"
                {% if value|stringformat:"s" == selected|stringformat:"s" %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
</select>
