{# Textarea field. #}
{# Variables: id, name, rows (default 4), placeholder, value, required (bool) #}
{# Classes kept in sync with form_styles.TEXTAREA_CLASS #}
<textarea class="w-full px-3 py-2 text-sm leading-relaxed rounded-lg border border-border bg-bg-secondary text-foreground placeholder:text-foreground-muted disabled:opacity-50 disabled:cursor-not-allowed"
          {% if id %}id="{{ id }}"{% endif %}
          {% if name %}name="{{ name }}"{% endif %}
          rows="{{ rows|default:'4' }}"
          {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
          {% if required %}required{% endif %}>{% if value %}{{ value }}{% endif %}</textarea>
