{# Text input field. Always pass `name`. Other vars are optional — use `only` in includes. #}
{# Optional: id, placeholder, value, required, maxlength, inputmode, pattern #}
{# Classes kept in sync with form_styles.INPUT_CLASS #}
<input type="text"
       class="w-full px-3 py-2 text-sm rounded-lg border border-border bg-bg-secondary text-foreground placeholder:text-foreground-muted disabled:opacity-50 disabled:cursor-not-allowed"
       name="{{ name }}"
       {% if id %}id="{{ id }}"{% endif %}
       {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
       {% if value %}value="{{ value }}"{% endif %}
       {% if maxlength %}maxlength="{{ maxlength }}"{% endif %}
       {% if inputmode %}inputmode="{{ inputmode }}"{% endif %}
       {% if pattern %}pattern="{{ pattern }}"{% endif %}
       {% if required %}required{% endif %}>
