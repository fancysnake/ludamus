{% load i18n tessera %}
{# Label for form fields. #}
{# Variables: for_id, text, required (bool) #}
{% ds_classes "label" as cls %}
<label {% if for_id %}for="{{ for_id }}"{% endif %}
       class="{{ cls }}">
    {{ text }}
    {% if required %}
        <span class="text-danger" aria-hidden="true">*</span><span class="sr-only">({% translate "required" %})</span>
    {% endif %}
</label>
