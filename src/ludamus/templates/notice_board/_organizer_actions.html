{% load i18n tessera %}
<div class="card">
    <div class="card-body space-y-2">
        <div class="relative" id="share-menu-wrapper">
            <button type="button"
                    class="btn btn-secondary text-sm w-full"
                    onclick="toggleMenu('share-menu')">
                {% icon "share" class="h-4 w-4" variant="mini" %}
                {% translate "Share" %}
            </button>
            <div id="share-menu"
                 class="hidden absolute top-full left-0 right-0 mt-1 rounded-lg border border-border bg-bg-secondary shadow-[var(--theme-shadow-md)] z-10">
                <button type="button"
                        class="w-full px-3 py-2 text-sm text-left text-foreground hover:bg-bg-tertiary focus-visible:bg-bg-tertiary rounded-t-lg"
                        id="copy-link-btn"
                        data-copied-text="{% translate "Copied!" %}"
                        data-default-text="{% translate "Copy link" %}">
                    {% icon "link" class="h-4 w-4 inline" variant="mini" %}
                    {% translate "Copy link" %}
                </button>
                <button type="button"
                        class="w-full px-3 py-2 text-sm text-left text-foreground hover:bg-bg-tertiary focus-visible:bg-bg-tertiary"
                        id="copy-info-btn">
                    {% icon "clipboard-document" class="h-4 w-4 inline" variant="mini" %}
                    {% translate "Copy info" %}
                </button>
                <button type="button"
                        class="w-full px-3 py-2 text-sm text-left text-foreground hover:bg-bg-tertiary focus-visible:bg-bg-tertiary rounded-b-lg"
                        id="show-qr-btn">
                    {% icon "qr-code" class="h-4 w-4 inline" variant="mini" %}
                    {% translate "Show QR code" %}
                </button>
            </div>
        </div>
        <a href="{% url 'web:notice-board:edit' pk=encounter.pk %}"
           class="btn btn-secondary text-sm w-full text-center">
            {% icon "pencil-square" class="h-4 w-4" variant="mini" %}
            {% translate "Edit encounter" %}
        </a>
        <form method="post"
              action="{% url 'web:notice-board:delete' pk=encounter.pk %}"
              onsubmit="return confirm('{% translate "Are you sure you want to delete this encounter?" %}')">
            {% csrf_token %}
            <button type="submit"
                    class="btn text-sm w-full text-[var(--theme-danger-base)] hover:bg-[var(--theme-danger-bg)]">
                {% icon "trash" class="h-4 w-4" variant="mini" %}
                {% translate "Delete encounter" %}
            </button>
        </form>
    </div>
</div>
