{% load i18n tessera %}
<div class="card">
    <div class="card-body text-center py-4">
        {% if encounter.max_participants > 0 %}
            <div class="text-2xl font-bold text-foreground">{{ rsvp_count }} / {{ encounter.max_participants }}</div>
            <div class="text-xs text-foreground-secondary uppercase tracking-wide mt-1">{% translate "spots taken" %}</div>
            <div class="w-full bg-bg-tertiary rounded-full h-1.5 mt-3">
                <div class="h-1.5 rounded-full {% if is_full %}bg-[var(--theme-danger-base)]{% elif spots_remaining == 1 %}bg-[var(--theme-warning-base)]{% else %}bg-primary{% endif %}"
                     style="width: {% widthratio rsvp_count encounter.max_participants 100 %}%"></div>
            </div>
        {% else %}
            <div class="text-2xl font-bold text-foreground">{{ rsvp_count }}</div>
            <div class="text-xs text-foreground-secondary uppercase tracking-wide mt-1">{% translate "attending" %}</div>
        {% endif %}
    </div>
</div>
