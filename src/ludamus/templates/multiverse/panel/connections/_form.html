{% load i18n %}
{% if form.non_field_errors %}
    <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700"
         role="alert">
        {% for error in form.non_field_errors %}<p>{{ error }}</p>{% endfor %}
    </div>
{% endif %}
<div class="space-y-1">
    <label class="block text-sm font-medium text-neutral-700"
           for="{{ form.service.id_for_label }}">{{ form.service.label }}</label>
    <select name="{{ form.service.html_name }}"
            id="{{ form.service.id_for_label }}"
            class="w-full rounded-lg border border-neutral-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
        {% for value, label in form.service.field.choices %}
            <option value="{{ value }}"
                    {% if form.service.value == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    {% for error in form.service.errors %}<p class="text-sm text-red-600">{{ error }}</p>{% endfor %}
</div>
<div class="space-y-1">
    <label class="block text-sm font-medium text-neutral-700"
           for="{{ form.display_name.id_for_label }}">{{ form.display_name.label }}</label>
    <input type="text"
           name="{{ form.display_name.html_name }}"
           id="{{ form.display_name.id_for_label }}"
           value="{{ form.display_name.value|default:'' }}"
           maxlength="255"
           required
           class="w-full rounded-lg border border-neutral-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
    {% for error in form.display_name.errors %}<p class="text-sm text-red-600">{{ error }}</p>{% endfor %}
</div>
