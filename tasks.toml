[p]
description = "Run any Poetry subcommand"
run = "poetry"

[dj]
description = "Run any django-admin subcommand"
run = "aube exec varlock run -- django-admin"

[messages]
description = "Extract translatable strings into locale/pl (file-only locations, no line numbers)"
run = "aube exec varlock run -- django-admin makemessages -l pl --add-location=file"

[messages-compile]
description = "Compile locale/pl translations to .mo"
run = "aube exec varlock run -- django-admin compilemessages -l pl"

[start]
description = "Start Django dev server with frontend watch"
run = "aube exec varlock run -- ./scripts/dev"

[dev]
description = "Start Django dev server with frontend watch"
run = "aube exec varlock run -- ./scripts/dev"

[build-frontend]
description = "Build frontend assets (CSS + JS)"
run = """
cd src/ludamus/client && npm install && npm run build
"""

[bootstrap]
description = "Set up the dev environment from scratch — idempotent"
run = """
poetry install
aube install
(cd src/ludamus/client && npm install)
if [ ! -f .env.local ]; then
  python -c "
import secrets
from cryptography.fernet import Fernet
print(f'SECRET_KEY={secrets.token_urlsafe(50)}')
print(f'DB_PASSWORD=dev-{secrets.token_hex(8)}')
print(f'AUTH0_CLIENT_SECRET={secrets.token_hex(16)}')
print(f'CREDENTIALS_ENCRYPTION_KEY={Fernet.generate_key().decode()}')
" > .env.local
  echo "Generated .env.local with per-dev secrets."
fi
aube exec varlock run -- django-admin migrate --noinput
aube exec varlock run -- django-admin createcachetable
aube exec varlock run -- django-admin downloadvendor
aube exec varlock run -- python scripts/bootstrap_dev.py
"""
