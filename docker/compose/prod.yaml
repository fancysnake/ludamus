---
name: ludamus

services:
  collectstatic:
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      target: prod
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ../../.env
    networks:
      - backend
    command: >
      run dj downloadvendor ::: dj collectstatic
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - ../../.env
    networks:
      - backend
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  migrations:
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      target: prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - backend
    command: >
      run dj migrate --noinput ::: dj createcachetable
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      target: prod
      args:
        DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE}
        ENV: ${ENV}
    depends_on:
      collectstatic:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ../../.env
    ports:
      - '127.0.0.1:8000:8000'
    networks:
      - backend
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/ || exit 1" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/var/lib/ludamus/postgres_data}
  static_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STATIC_DATA_PATH:-/var/lib/ludamus/static}
  media_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_DATA_PATH:-/var/lib/ludamus/media}
