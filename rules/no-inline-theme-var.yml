id: no-inline-theme-var
language: html
severity: warning
rule:
  kind: attribute
  all:
    - regex: 'style="[^"]*var\(--theme-'
    - not:
        regex: 'style="[^"]*(box-shadow|linear-gradient|background:\s*linear)'
message: |
  Use Tailwind class instead of inline --theme- CSS variable.
  Vars that have --color- equivalents in @theme can use standard utilities:
    border-color: var(--theme-border)        → border-border
    background-color: var(--theme-bg-secondary) → bg-bg-secondary
    color: var(--theme-primary)              → text-primary
  Vars without @theme equivalents need arbitrary value syntax:
    background-color: var(--theme-warning-bg) → bg-(--theme-warning-bg)
    color: var(--theme-warning-text)          → text-(--theme-warning-text)
