---
name: CI

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

"on":
  pull_request:
    paths-ignore: ["docs/**"]

  push:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run p install
      - run: mise run prcheck
      - run: mise run test -- --cov --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  playwright:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise run p install
      - name: Install theme dependencies
        run: npm install
        working-directory: src/ludamus/gates/web/django/theme/static_src/
        # per the docs: "caching browser binaries is not recommended,
        # since the amount of time it takes to restore the cache is
        # comparable to the time it takes to download the binaries"
      - name: Install Playwright Browsers
        run: mise run install:playwright

      - name: Run end-to-end tests
        run: mise run e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ./tests/e2e/playwright-report/
          retention-days: 30
