name: Deploy on staging

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Rebuild and upstart dockers
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://test.zagrajmy.net
    steps:
      - name: Materialize .env.local from environment secrets
        env:
          ENV: production
          DEBUG: 'false'
          USE_POSTGRES: 'true'
          DJANGO_SETTINGS_MODULE: ludamus.edges.settings
          DB_HOST: db
          DB_PORT: '5432'
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          ROOT_DOMAIN: ${{ secrets.ROOT_DOMAIN }}
          SESSION_COOKIE_DOMAIN: ${{ secrets.SESSION_COOKIE_DOMAIN }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          MEMBERSHIP_API_BASE_URL: ${{ secrets.MEMBERSHIP_API_BASE_URL }}
          MEMBERSHIP_API_TOKEN: ${{ secrets.MEMBERSHIP_API_TOKEN }}
          SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
          STATIC_ROOT: ${{ secrets.STATIC_ROOT }}
          MEDIA_ROOT: ${{ secrets.MEDIA_ROOT }}
          POSTGRES_DATA_PATH: ${{ secrets.POSTGRES_DATA_PATH }}
          STATIC_DATA_PATH: ${{ secrets.STATIC_DATA_PATH }}
          MEDIA_DATA_PATH: ${{ secrets.MEDIA_DATA_PATH }}
        run: |
          set -eu
          : > .env.local
          for k in ENV DEBUG USE_POSTGRES DJANGO_SETTINGS_MODULE \
                   ALLOWED_HOSTS ROOT_DOMAIN SESSION_COOKIE_DOMAIN \
                   DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD \
                   SECRET_KEY CREDENTIALS_ENCRYPTION_KEY \
                   AUTH0_CLIENT_ID AUTH0_CLIENT_SECRET AUTH0_DOMAIN \
                   MEMBERSHIP_API_BASE_URL MEMBERSHIP_API_TOKEN \
                   SUPPORT_EMAIL STATIC_ROOT MEDIA_ROOT \
                   POSTGRES_DATA_PATH STATIC_DATA_PATH MEDIA_DATA_PATH; do
            v="$(printenv "$k" || true)"
            [ -n "$v" ] && printf '%s=%s\n' "$k" "$v" >> .env.local
          done
          for r in SECRET_KEY CREDENTIALS_ENCRYPTION_KEY DB_PASSWORD \
                   AUTH0_CLIENT_SECRET MEMBERSHIP_API_TOKEN \
                   ALLOWED_HOSTS ROOT_DOMAIN DB_NAME DB_USER \
                   AUTH0_CLIENT_ID AUTH0_DOMAIN MEMBERSHIP_API_BASE_URL \
                   POSTGRES_DATA_PATH STATIC_DATA_PATH MEDIA_DATA_PATH; do
            grep -q "^${r}=" .env.local || { echo "Missing environment secret: $r" >&2; exit 1; }
          done

      - name: Upload .env.local to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_DEPLOY_KEY }}
          source: .env.local
          target: ludamus/

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_COMMIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_DEPLOY_KEY }}
          envs: GITHUB_COMMIT_SHA
          script: |
            set -ex
            cd ludamus/
            chmod 600 .env.local
            git fetch
            git checkout $GITHUB_COMMIT_SHA
            export GIT_COMMIT_SHA=$(git rev-parse --short HEAD)
            docker compose --env-file .env.local -p ludamus-staging -f docker/compose/prod.yaml up --build --pull always -d
            docker image prune -f
